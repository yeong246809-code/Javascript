<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h3>2.연산자</h3>
    <script>
        let num1 = 1;
        let num2 = 2;
        let num3 = 3, num4 = 4;

        let res1 = num1 + num2;
        let res2 = num1 - num2;
        let res3 = num2 * num3;
        let res4 = num4 / num2;
        let res5 = num4 % num3;

        document.write('res1 : ' + res1 + '<br>');
        document.write('res2 : ' + res2 + '<br>');
        document.write('res3 : ' + res3 + '<br>');
        document.write('res4 : ' + res4 + '<br>');
        document.write('res5 : ' + res5 + '<br>');

    </script>
    
    
    
    <h4>복합연산자</h4>
    <script>
        let var1 = 1;
        let var2 = 2;
        let var3 = 3;
        let var4 = 4;

        var1 += 1;
        var2 -= 2;
        var3 *= 3;
        var4 /= 4;

        document.write('var1 : ' + var1 + '<br>');
        document.write('var2 : ' + var2 + '<br>');
        document.write('var3 : ' + var3 + '<br>');
        document.write('var4 : ' + var4 + '<br>');

    </script>

    
    <h4>비교연산자</h4>
    <script>

        let n1 = 1,n2 = 2, n3 = 3, n4 = 4;

        let r1 = n1 > n2;
        let r2 = n1 < n2;
        let r3 = n2 >= n3;
        let r4 = n2 <= n3;
        let r5 = n3 == n4;
        let r6 = n3 != n4;

        document.write('r1 : ' + r1 + '<br>');
        document.write('r2 : ' + r2 + '<br>');
        document.write('r3 : ' + r3 + '<br>');
        document.write('r4 : ' + r4 + '<br>');
        document.write('r5 : ' + r5 + '<br>');
        document.write('r6 : ' + r6 + '<br>');
    </script>
    
    
    <h4>논리연산자</h4>
    <script>
        let rs1 = n1 > 1 && n2 > 2;
        let rs2 = n1 < 2 && n2 < 3;
        let rs3 = n1 >= 1 || n2 >= 1;
        let rs4 = n2 > 3 || n3 > 2;
        let rs5 = !(n3 > n4);

        document.write('rs1 : ' + rs1 + '<br>');
        document.write('rs2 : ' + rs2 + '<br>');
        document.write('rs3 : ' + rs3 + '<br>');
        document.write('rs4 : ' + rs4 + '<br>');
        document.write('rs5 : ' + rs5 + '<br>');
    </script>
    
    
    <h4>일치연산자</h4>
    <script>

        let num = 11;
        let str = '11';
        let result1 = num == str;   // true - 값 비교
        let result2 = num === str; // false - 값 ,타입 비교 
        let result3 = 0 == false;
        let result4 = 0 === false;

        document.write('result1 : ' + result1 + '<br>');
        document.write('result2 : ' + result2 + '<br>');
        document.write('result3 : ' + result3 + '<br>');
        document.write('result4 : ' + result4 + '<br>');

    </script>
</body>
</html>
