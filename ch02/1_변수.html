<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h3>1.변수</h3>

    <script>
        
        //var : ES5에서 사용한 변수 선언 키워드 현대 자바스크립트에서는 사용금지
        var value1 = 1;
        var value2 = 'hello';

        //let : ES6에서 사용하는 변수 선언 키워드, var대신 let으로 사용
        let var1 = 1;
        let var2 = 3.12;
        let var3 = true;
        let var4 = false;
        let var5 = "hello";         // 문자열 : javascript는 큰따옴표, 작은따옴표 혼용
        let var6 = 'welcome';
        let var7 = null;            //null값
        let var8;                   //undifined 값

        //const : 상수 선언 키워드
        const NUM = 1;
        const PI = 3.14;

        document.write('<p>');
        document.write('value1 : ' + value1 + ', type : ' + typeof value1 + '<br>');
        document.write('value2 : ' + value2 + ', type : ' + typeof value2 + '<br>');
        document.write('var1 : ' + var1 + ', type : ' + typeof var1 + '<br>');
        document.write('var2 : ' + var2 + ', type : ' + typeof var2 + '<br>');
        document.write('var3 : ' + var3 + ', type : ' + typeof var3 + '<br>');
        document.write('var4 : ' + var4 + ', type : ' + typeof var4 + '<br>');
        document.write('var5 : ' + var5 + ', type : ' + typeof var5 + '<br>');
        document.write('var6 : ' + var6 + ', type : ' + typeof var6 + '<br>');
        document.write('var7 : ' + var7 + ', type : ' + typeof var7 + '<br>');
        document.write('var8 : ' + var8 + ', type : ' + typeof var8 + '<br>');
        document.write('NUM : ' + NUM + ', type : ' + typeof NUM + '<br>');
        document.write('PI : ' + PI + ', type : ' + typeof PI + '<br>');
        document.write('</p>');

    </script>



</body>
</html>
