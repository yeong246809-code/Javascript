    <h4>for</h4>
    <script>
        for(let i=0 ; i<5 ; i++){
            document.write('<p>i : ' + i + '</p>');
        }

        // 1부터 10까지 합
        let sum = 0;
        for(let k=1 ; k<=10 ; k++){
            sum += k;
        }
        document.write('<p>1 부터 10까지 합  : ' + sum + '</p>');


        // 별 삼각형
        for(let x=1 ; x<=9 ; x++){

            for(let y=1 ; y<=x ; y++){
                document.write('★');
            }
            document.write('<br>');
        }
    </script>
