<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./js/Account.js"></script>
</head>
<body>
    <h3>1.자바스크립트 객체</h3>

    <script>
        //객체 생성
        const kb = new Account('국민은행','101-12-1110','김유신',10000);
        kb.deposit(40000);
        kb.withraw(5000);
        kb.show();

        const wr = new Account('우리은행','101-12-1112','김춘추',10000);
        wr.deposit(30000);
        wr.withraw(7000);
        wr.show();

        //사용자 정의 객체
        const sonata = {
            //속성
            aname: '소나타',
            color: '흰색',
            speed: 0,

            //기능
            speedUp: function(speed){
                this.speed += speed;
            },
            speedDown: function(speed){
                this.speed -= speed;
            },
            show: function(){
                document.write('<p>');
                document.write('차량명 : ' + aname +'<br>');
                document.write('차량색 : ' + color +'<br>');
                document.write('현재속도 : ' + speed +'<br>');
                document.write('<p>');
            }
        };
        sonata.speedUp(100);
        sonata.speedDown(20);
        sonata.show();


        // 구조 분해 할당
        const {aname,color,speed} = sonata;

        document.write('<p>');
        document.write('name : ' + aname + '<br>');
        document.write('color : ' + color + '<br>');
        document.write('speed : ' + speed + '<br>');
        document.write('<p>');
    </script>

</body>
</html>
