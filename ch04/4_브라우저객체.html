<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h3>4.브라우저 객체</h3>
        
        
        <h4>window</h4>    
        <script>

            // window객체
            // -브라우저 객체, 자바스크립트 최상위 객체
            // -생략가능
            // window 객체 콘솔 확인
            console.log(window);

            //브라우저 크기
            document.write('innerwidth : '+ window.innerWidth + '<br>');
            document.write('innerwidth : '+ window.innerHeight + '<br>');

            //새창 띄우기
            window.open('./1_객체.html', '새창 테스트', 'width=600 height=500');

            //브라우저 로컬 저장소 : 해당 페이지에 저장한 데이터를 영구 저장

            localStorage.setItem('name','김유신');

            //브라우저 세션 저장소 : 해당 페이지가 실행되는동안 데이터를 저장

            sessionStorage.setItem('name', '김춘추');
        </script>
        <h4>navigator</h4>
        <script>
            /*
                브라우저 정보객체
                -
            */
           console.log(navigator);

           document.write('브라우저 코드명 : ' + navigator.appCodeName + '<br>');
           document.write('브라우저 이름 : ' + navigator.appName + '<br>');
           document.write('브라우저 버전 : ' + navigator.appVersion + '<br>');
           document.write('브라우저 플랫폼 : ' + navigator.platform + '<br>');
           document.write('브라우저 정보 : ' + navigator.userAgent + '<br>');




        </script>    
        <h4>location</h4>
        
        <button onclick="reload()">새로고침</button>
        <button onclick="btn2click()">네이버</button>
        <button onclick="">구글</button>
        
        <script>

            /*
                브라우저 주소창 객체
            */
           //페이지 새로고침
            function reload(){
                location.reload;
            }

            //페이지 이동 현재 페이지 주소 히스토리에 저장
            function btn2click(){
                location.href = 'http://naver.com'
            }
            //페이지 이동, 현재 페이지 주소 히스토리에 저장 안함
            function btn3click(){
                location.replace('http://google.com')
            }

        </script>    
        <h4>history</h4>
        <button onclick="btnback()">뒤로</button>
        <button onclick="btnforward()">앞으로</button>
        
        <script>

            /*
            브라우저 주고 히스토리 객체
            */

            document.write('history 길이 : ' +history.length+ '<br>');

            function btnback(){
                    history.back();
            }
            function btnforward(){
                history.forward();
            }
        </script>
        
        
    </body>
</html>
